<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BillCraft is a premium billing and invoice management platform for businesses." />
    <title>BillCraft - Premium Responsive Billing App</title>
    <script>
      window.addEventListener('error', function(e) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.backgroundColor = '#ef4444';
        errorDiv.style.color = '#ffffff';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.innerHTML = '<h2>Uncaught Exception:</h2>' + e.message + '\n\nStack:\n' + (e.error ? e.error.stack : 'No stack trace available');
        document.body.appendChild(errorDiv);
      });

      window.addEventListener('unhandledrejection', function(e) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.backgroundColor = '#ef4444';
        errorDiv.style.color = '#ffffff';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.innerHTML = '<h2>Unhandled Promise Rejection:</h2>' + e.reason + '\n\nStack:\n' + (e.reason && e.reason.stack ? e.reason.stack : 'No stack trace available');
        document.body.appendChild(errorDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
